name: Deploy cuda-oxide Book

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: cuda-oxide-book/requirements.txt

      - name: Install dependencies
        run: pip install -r cuda-oxide-book/requirements.txt

      - name: Build Sphinx site
        run: sphinx-build -b html cuda-oxide-book cuda-oxide-book/_build/html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: cuda-oxide-book/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
